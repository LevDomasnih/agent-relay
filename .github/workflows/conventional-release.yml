name: Conventional Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: conventional-release
  cancel-in-progress: false

jobs:
  release:
    if: github.actor != 'github-actions[bot]' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Plan release from conventional commits
        id: plan
        run: |
          set -euo pipefail
          plan_json="$(node scripts/plan-conventional-release.mjs)"
          echo "$plan_json"
          echo "release=$(node -e 'const fs=require("fs"); const p=JSON.parse(fs.readFileSync(0,"utf8")); process.stdout.write(String(p.release));' <<< "$plan_json")" >> "$GITHUB_OUTPUT"
          echo "bump=$(node -e 'const fs=require("fs"); const p=JSON.parse(fs.readFileSync(0,"utf8")); process.stdout.write(p.bump);' <<< "$plan_json")" >> "$GITHUB_OUTPUT"

      - name: Stop when there is nothing to release
        if: steps.plan.outputs.release != 'true'
        run: echo "No feat/fix/perf/breaking conventional commits since the latest v* tag."

      - name: Bump versions
        if: steps.plan.outputs.release == 'true'
        id: bump
        run: |
          set -euo pipefail
          version="$(node scripts/bump-version.mjs "${{ steps.plan.outputs.bump }}")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Format changed files
        if: steps.plan.outputs.release == 'true'
        run: pnpm exec prettier --write package.json packages/*/package.json pnpm-lock.yaml

      - name: Release check
        if: steps.plan.outputs.release == 'true'
        run: pnpm run release:check

      - name: Commit version bump and tag
        if: steps.plan.outputs.release == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json packages/core/package.json packages/cli/package.json packages/mcp-server/package.json packages/server/package.json pnpm-lock.yaml
          git commit -m "chore(release): ${{ steps.bump.outputs.tag }}"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "${{ steps.bump.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Publish release workflow
        if: steps.plan.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --ref main -f tag="${{ steps.bump.outputs.tag }}"
