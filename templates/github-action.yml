name: Coordinaut

on:
  pull_request:

jobs:
  verify-agent-coordination:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify agent commit trailers
        run: |
          npx @coordinaut/cli init --project-name "${{ github.repository }}"
          npx @coordinaut/cli verify-commit-range --range "origin/${{ github.base_ref }}..HEAD"
